<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VoiceDeck Smart Presenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              brand: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                500: '#0ea5e9',
                600: '#0284c7',
                900: '#0c4a6e',
              }
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          },
        },
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #1e1e1e; }
      ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #777; }
      
      /* --- Base Transition Class --- */
      .slide-enter-active, .slide-leave-active { transition: all 0.8s ease-in-out; }
      
      /* --- EXTENSIVE EFFECTS LIBRARY --- */

      /* EXISTING EFFECTS */
      .effect-accordion { animation: accordion 1s ease-out; transform-origin: center; }
      @keyframes accordion { from { transform: scaleX(0); opacity: 0; } to { transform: scaleX(1); opacity: 1; } }
      .effect-airplane { animation: airplane 1.2s ease-in-out; }
      @keyframes airplane { from { transform: scale(0.2) translate(-100%, 100%) rotate(-20deg); opacity: 0; } to { transform: scale(1) translate(0, 0) rotate(0); opacity: 1; } }
      .effect-bars { animation: bars 1s ease-in-out; }
      @keyframes bars { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0 0 0 0); } }
      .effect-blend { animation: blend 1.5s ease-in-out; mix-blend-mode: hard-light; }
      @keyframes blend { from { opacity: 0; filter: contrast(2); } to { opacity: 1; filter: contrast(1); } }
      .effect-blinds { animation: blinds 1s linear; }
      @keyframes blinds { from { clip-path: polygon(0 0, 100% 0, 100% 0, 0 0, 0 20%, 100% 20%, 100% 20%, 0 20%, 0 40%, 100% 40%, 100% 40%, 0 40%, 0 60%, 100% 60%, 100% 60%, 0 60%, 0 80%, 100% 80%, 100% 80%, 0 80%); } to { clip-path: polygon(0 0, 100% 0, 100% 20%, 0 20%, 0 20%, 100% 20%, 100% 40%, 0 40%, 0 40%, 100% 40%, 100% 60%, 0 60%, 0 60%, 100% 60%, 100% 80%, 0 80%, 0 80%, 100% 80%, 100% 100%, 0 100%); } }
      .effect-bounce { animation: bounceIn 1s; }
      @keyframes bounceIn { 0%, 20%, 40%, 60%, 80%, 100% {transition-timing-function: cubic-bezier(0.215, 0.610, 0.355, 1.000);} 0% {opacity: 0; transform: scale3d(.3, .3, .3);} 20% {transform: scale3d(1.1, 1.1, 1.1);} 40% {transform: scale3d(.9, .9, .9);} 60% {opacity: 1; transform: scale3d(1.03, 1.03, 1.03);} 80% {transform: scale3d(.97, .97, .97);} 100% {opacity: 1; transform: scale3d(1, 1, 1);} }
      .effect-bouncy-dots { animation: bouncyDots 1s steps(5); }
      @keyframes bouncyDots { from { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); } to { transform: scale(1); opacity: 1; } }
      .effect-box { animation: boxIn 0.8s ease; transform-origin: 50% 100%; }
      @keyframes boxIn { from { transform: perspective(1000px) rotateX(90deg); opacity: 0; } to { transform: perspective(1000px) rotateX(0deg); opacity: 1; } }
      .effect-checkerboard { animation: checkerboard 1s steps(10); -webkit-mask-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000); -webkit-mask-size: 60px 60px; -webkit-mask-position: 0 0, 30px 30px; }
      @keyframes checkerboard { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
      .effect-circles { animation: circles 1s ease-in; clip-path: circle(0% at 50% 50%); }
      @keyframes circles { to { clip-path: circle(150% at 50% 50%); } }
      .effect-clock { animation: clock 1.2s linear; clip-path: polygon(50% 50%, 50% 0, 50% 0, 50% 0, 50% 0, 50% 0); }
      @keyframes clock { 0% { clip-path: polygon(50% 50%, 50% 0, 50% 0, 50% 0, 50% 0, 50% 0); } 25% { clip-path: polygon(50% 50%, 50% 0, 100% 0, 100% 50%, 100% 50%, 100% 50%); } 50% { clip-path: polygon(50% 50%, 50% 0, 100% 0, 100% 100%, 50% 100%, 50% 100%); } 75% { clip-path: polygon(50% 50%, 50% 0, 100% 0, 100% 100%, 0 100%, 0 50%); } 100% { clip-path: polygon(50% 50%, 50% 0, 100% 0, 100% 100%, 0 100%, 0 0); } }
      .effect-comb { animation: comb 1s ease; }
      @keyframes comb { from { transform: scaleX(2) translateX(-20%); opacity: 0; filter: blur(10px); } to { transform: scaleX(1) translateX(0); opacity: 1; filter: blur(0); } }
      .effect-conveyor { animation: conveyor 1s linear; }
      @keyframes conveyor { from { transform: translateX(100%); } to { transform: translateX(0); } }
      .effect-cover { animation: cover 0.8s ease-out; z-index: 10; }
      @keyframes cover { from { transform: translateX(100%); z-index: 10; } to { transform: translateX(0); z-index: 10; } }
      .effect-cube { animation: cubeEnter 1s cubic-bezier(0.25, 1, 0.5, 1); }
      @keyframes cubeEnter { from { transform: perspective(1000px) rotateY(90deg) translateX(50%); opacity: 0; } to { transform: perspective(1000px) rotateY(0deg) translateX(0); opacity: 1; } }
      .effect-cut { animation: cut 0.1s linear; }
      @keyframes cut { from { opacity: 0; } to { opacity: 1; } }
      .effect-diamond { animation: diamond 1s ease-in-out; clip-path: polygon(50% 50%, 50% 50%, 50% 50%, 50% 50%); }
      @keyframes diamond { to { clip-path: polygon(50% -50%, 150% 50%, 50% 150%, -50% 50%); } }
      .effect-dissolve { animation: fadeIn 1.5s ease-in-out; }
      .effect-fade { animation: fadeIn 0.8s ease-in-out; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .effect-falling-confetti { animation: confetti 1.2s ease-out; transform-origin: 50% -50%; }
      @keyframes confetti { from { transform: translateY(-100%) rotate(10deg); opacity: 0; } to { transform: translateY(0) rotate(0); opacity: 1; } }
      .effect-ferris-wheel { animation: ferris 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); transform-origin: 50% 100%; }
      @keyframes ferris { from { transform: rotate(90deg); opacity: 0; } to { transform: rotate(0); opacity: 1; } }
      .effect-fine-dust { animation: dust 2s ease; }
      @keyframes dust { from { filter: blur(20px) grayscale(1); opacity: 0; transform: scale(1.1); } to { filter: blur(0) grayscale(0); opacity: 1; transform: scale(1); } }
      .effect-flash { animation: flash 0.5s ease-out; }
      @keyframes flash { 0% { opacity: 0; filter: brightness(5); } 100% { opacity: 1; filter: brightness(1); } }
      .effect-flip { animation: flipX 0.8s; backface-visibility: hidden; }
      @keyframes flipX { from { transform: perspective(400px) rotateX(90deg); opacity: 0; } to { transform: perspective(400px) rotateX(0deg); opacity: 1; } }
      .effect-fracture { animation: fracture 0.8s ease-in-out; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
      @keyframes fracture { from { clip-path: polygon(50% 50%, 50% 50%, 50% 50%, 50% 50%); transform: scale(0.8) rotate(5deg); opacity: 0; } to { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); transform: scale(1) rotate(0); opacity: 1; } }
      .effect-gallery { animation: gallery 1s ease; transform-origin: left center; }
      @keyframes gallery { from { transform: perspective(800px) rotateY(-45deg) translateX(-200px); opacity: 0; } to { transform: perspective(800px) rotateY(0) translateX(0); opacity: 1; } }
      .effect-glitter { animation: glitter 1s linear; }
      @keyframes glitter { 0% { opacity: 0; filter: contrast(1.5) brightness(1.5); } 50% { opacity: 0.5; filter: contrast(2) brightness(2) hue-rotate(90deg); } 100% { opacity: 1; filter: contrast(1) brightness(1) hue-rotate(0); } }
      .effect-helix { animation: helix 1s linear; transform-style: preserve-3d; }
      @keyframes helix { from { transform: rotateY(180deg) scale(0); opacity: 0; } to { transform: rotateY(0) scale(1); opacity: 1; } }
      .effect-honeycomb { animation: honeycomb 1.2s ease-out; -webkit-mask-image: radial-gradient(circle, black 50%, transparent 50%); -webkit-mask-size: 40px 40px; }
      @keyframes honeycomb { from { -webkit-mask-position: 0 0; opacity: 0; transform: scale(1.2); } to { -webkit-mask-position: 20px 20px; opacity: 1; transform: scale(1); } }
      .effect-iris { animation: iris 1s ease-in-out; clip-path: circle(0% at 50% 50%); }
      @keyframes iris { from { clip-path: circle(0% at 50% 50%); } to { clip-path: circle(100% at 50% 50%); } }
      .effect-lens-flare { animation: flare 1s ease-out; }
      @keyframes flare { from { opacity: 0; filter: brightness(3) drop-shadow(0 0 50px white); } to { opacity: 1; filter: brightness(1) drop-shadow(0 0 0 transparent); } }
      .effect-morph { animation: morph 1s ease-in-out; }
      @keyframes morph { from { border-radius: 50%; transform: scale(0); opacity: 0; } to { border-radius: 0; transform: scale(1); opacity: 1; } }
      .effect-origami { animation: origami 1.2s ease-in-out; transform-origin: top center; }
      @keyframes origami { from { transform: perspective(600px) rotateX(-90deg); opacity: 0; } 50% { transform: perspective(600px) rotateX(45deg); opacity: 0.5; } to { transform: perspective(600px) rotateX(0); opacity: 1; } }
      .effect-pages { animation: pages 1s ease; transform-origin: 0 50%; }
      @keyframes pages { from { transform: perspective(1000px) rotateY(-90deg); opacity: 0; } to { transform: perspective(1000px) rotateY(0); opacity: 1; } }
      .effect-pan { animation: pan 15s ease-in-out infinite alternate; }
      @keyframes pan { from { transform: scale(1.2) translate(-10%, -10%); opacity: 0; } 10% { opacity: 1; } to { transform: scale(1.2) translate(10%, 10%); opacity: 1; } }
      .effect-peel-off { animation: peel 1s ease-in; transform-origin: top left; }
      @keyframes peel { from { clip-path: polygon(100% 100%, 0 0, 0 0); } to { clip-path: polygon(100% 100%, 0 0, 100% 0); } }
      .effect-pinwheel { animation: pinwheel 1s ease-out; clip-path: polygon(50% 50%, 50% 0, 100% 0, 100% 50%, 100% 100%, 50% 100%, 0 100%, 0 50%, 0 0, 50% 0); }
      @keyframes pinwheel { from { transform: rotate(720deg) scale(0); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }
      .effect-pixelate { animation: pixelate 0.8s steps(10); }
      @keyframes pixelate { from { filter: blur(20px); transform: scale(1.1); opacity: 0; } to { filter: blur(0); transform: scale(1); opacity: 1; } }
      .effect-pulse { animation: pulseEnter 0.6s cubic-bezier(0.4, 0, 0.6, 1); }
      @keyframes pulseEnter { 0% { transform: scale(0.9); opacity: 0; } 70% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); } }
      .effect-push { animation: push 0.8s ease-out; }
      @keyframes push { from { transform: translateY(100%); } to { transform: translateY(0); } }
      .effect-reveal { animation: reveal 1s ease-in-out; clip-path: inset(50% 0 50% 0); }
      @keyframes reveal { to { clip-path: inset(0 0 0 0); } }
      .effect-rotate { animation: rotateEnter 0.8s; transform-origin: center; }
      @keyframes rotateEnter { from { transform: rotate(-180deg) scale(0); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }
      .effect-shred { animation: shred 1s ease-in-out; -webkit-mask-image: repeating-linear-gradient(90deg, black, black 10px, transparent 10px, transparent 20px); }
      @keyframes shred { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .effect-shuffle { animation: shuffle 0.8s ease-out; }
      @keyframes shuffle { 0% { transform: translateX(-50%) scale(0.8); opacity: 0; z-index: 1; } 50% { transform: translateX(10%) scale(0.9); opacity: 0.5; z-index: 5; } 100% { transform: translateX(0) scale(1); opacity: 1; z-index: 10; } }
      .effect-sparkle { animation: sparkle 1.2s linear; }
      @keyframes sparkle { 0% { opacity: 0; filter: brightness(0.5); } 50% { opacity: 0.8; filter: brightness(2) contrast(1.5); } 100% { opacity: 1; filter: brightness(1); } }
      .effect-spiral { animation: spiral 1s ease-in; }
      @keyframes spiral { from { transform: rotate(360deg) scale(0); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }
      .effect-split { animation: split 1s cubic-bezier(0.16, 1, 0.3, 1); clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%); }
      @keyframes split { from { clip-path: polygon(50% 0, 50% 0, 50% 100%, 50% 100%); opacity: 0; } to { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); opacity: 1; } }
      .effect-spotlight { animation: spotlight 1.2s ease-out; -webkit-mask-image: radial-gradient(circle, black 100%, transparent 100%); }
      @keyframes spotlight { from { -webkit-mask-size: 0% 0%; opacity: 0; } to { -webkit-mask-size: 200% 200%; opacity: 1; } }
      .effect-stairs { animation: stairs 1s steps(5); transform-origin: bottom left; }
      @keyframes stairs { from { transform: translateY(100%) scale(0.5); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
      .effect-tiles { animation: tiles 1s ease-out; -webkit-mask-image: repeating-linear-gradient(45deg, black, black 20px, transparent 20px, transparent 40px); }
      @keyframes tiles { from { transform: scale(1.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      .effect-turbulence { animation: turbulence 1s linear; }
      @keyframes turbulence { 0% { transform: scale(1.2) translate(-5%, -5%); opacity: 0; filter: url('#turbulence'); } 25% { transform: scale(1.1) translate(5%, 5%); } 50% { transform: scale(1.1) translate(-5%, 5%); } 75% { transform: scale(1.05) translate(5%, -5%); } 100% { transform: scale(1) translate(0, 0); opacity: 1; } }
      .effect-uncover { animation: uncover 0.8s ease-in; z-index: 1; }
      @keyframes uncover { from { transform: translateX(-100%); z-index: 20; } to { transform: translateX(0); z-index: 20; } }
      .effect-vortex { animation: vortex 1.5s ease-in; transform-origin: center center; }
      @keyframes vortex { from { transform: rotate(720deg) scale(0); filter: blur(10px); opacity: 0; } to { transform: rotate(0) scale(1); filter: blur(0); opacity: 1; } }
      .effect-wedge { animation: wedge 1s linear; clip-path: circle(100% at 50% 50%); }
      @keyframes wedge { from { clip-path: polygon(50% 50%, 50% 0, 50% 0); opacity: 0; } to { clip-path: polygon(50% 50%, 50% 0, 50% 0, 100% 0, 100% 100%, 0 100%, 0 0, 50% 0); opacity: 1; } }
      .effect-wheelbarrow { animation: wheelbarrow 1s ease-out; transform-origin: 50% 100%; }
      @keyframes wheelbarrow { from { transform: rotateX(-45deg) translateY(100%); opacity: 0; } to { transform: rotateX(0) translateY(0); opacity: 1; } }
      .effect-window { animation: window 1s ease-in-out; clip-path: inset(0 0 0 0); }
      @keyframes window { from { clip-path: inset(50% 50% 50% 50%); opacity: 0; } to { clip-path: inset(0 0 0 0); opacity: 1; } }
      .effect-wipe { animation: wipe 0.8s linear; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
      @keyframes wipe { from { clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); } to { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); } }
      .effect-zoom { animation: zoomIn 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
      @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

      /* --- NEW 3D EFFECTS --- */
      .effect-arrive { animation: arrive 1s ease-out; }
      @keyframes arrive { from { transform: scale(0.1) translateZ(-500px); opacity: 0; } to { transform: scale(1) translateZ(0); opacity: 1; } }
      
      .effect-leave { animation: leaveEnter 1s ease-out; }
      @keyframes leaveEnter { from { transform: scale(2); opacity: 0; } to { transform: scale(1); opacity: 1; } }

      .effect-turntable { animation: turntable 1.2s ease-in-out; transform-origin: center bottom; }
      @keyframes turntable { from { transform: rotateX(20deg) rotateY(180deg); opacity: 0; } to { transform: rotateX(0) rotateY(0); opacity: 1; } }

      .effect-swing { animation: swing 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: top center; }
      @keyframes swing { from { transform: rotateX(-100deg); opacity: 0; } to { transform: rotateX(0); opacity: 1; } }

      .effect-jump-turn { animation: jumpTurn 1s ease; }
      @keyframes jumpTurn { 0% { transform: scale(0) rotate(0); opacity: 0; } 50% { transform: scale(1.2) rotate(180deg); } 100% { transform: scale(1) rotate(360deg); opacity: 1; } }

      .effect-rotate-3d { animation: rotate3d 1s ease; }
      @keyframes rotate3d { from { transform: rotate3d(1, 1, 1, 90deg); opacity: 0; } to { transform: rotate3d(0, 0, 0, 0); opacity: 1; } }

      .effect-orbit-3d { animation: orbit3d 1.5s linear; transform-origin: center; }
      @keyframes orbit3d { from { transform: rotateY(180deg) translateX(200px) scale(0.5); opacity: 0; } to { transform: rotateY(0) translateX(0) scale(1); opacity: 1; } }

      .effect-pan-3d { animation: pan3d 1s ease-out; }
      @keyframes pan3d { from { transform: perspective(500px) rotateY(-30deg) translateZ(-100px); opacity: 0; } to { transform: perspective(500px) rotateY(0) translateZ(0); opacity: 1; } }

      .effect-spin-3d { animation: spin3d 1s ease-out; }
      @keyframes spin3d { from { transform: rotateY(360deg) scale(0); opacity: 0; } to { transform: rotateY(0) scale(1); opacity: 1; } }

      .effect-tilt-3d { animation: tilt3d 1s ease-out; transform-origin: bottom; }
      @keyframes tilt3d { from { transform: rotateX(90deg); opacity: 0; } to { transform: rotateX(0); opacity: 1; } }

      /* --- CLASSIC EFFECTS --- */
      .effect-newsflash { animation: newsflash 1s ease-in; }
      @keyframes newsflash { from { transform: rotate(720deg) scale(0.1); opacity: 0; } to { transform: rotate(0) scale(1); opacity: 1; } }

      .effect-outline { animation: outline 1s ease-out; clip-path: inset(0 0 0 0); }
      @keyframes outline { from { clip-path: inset(10% 10% 10% 10%); opacity: 0; filter: grayscale(1); } to { clip-path: inset(0 0 0 0); opacity: 1; filter: grayscale(0); } }

      .effect-uncover-left { animation: uncoverLeft 0.8s ease-out; }
      @keyframes uncoverLeft { from { transform: translateX(100%); } to { transform: translateX(0); } }
      .effect-uncover-right { animation: uncoverRight 0.8s ease-out; }
      @keyframes uncoverRight { from { transform: translateX(-100%); } to { transform: translateX(0); } }
      .effect-uncover-up { animation: uncoverUp 0.8s ease-out; }
      @keyframes uncoverUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
      .effect-uncover-down { animation: uncoverDown 0.8s ease-out; }
      @keyframes uncoverDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

      .effect-wedge-left { animation: wedgeLeft 1s ease; clip-path: circle(100% at 0 50%); }
      @keyframes wedgeLeft { from { clip-path: circle(0% at 0 50%); } to { clip-path: circle(150% at 0 50%); } }
      .effect-wedge-right { animation: wedgeRight 1s ease; clip-path: circle(100% at 100% 50%); }
      @keyframes wedgeRight { from { clip-path: circle(0% at 100% 50%); } to { clip-path: circle(150% at 100% 50%); } }

      .effect-blinds-left { animation: blindsLeft 1s linear; }
      @keyframes blindsLeft { from { transform: scaleX(0); transform-origin: left; } to { transform: scaleX(1); transform-origin: left; } }
      .effect-blinds-right { animation: blindsRight 1s linear; }
      @keyframes blindsRight { from { transform: scaleX(0); transform-origin: right; } to { transform: scaleX(1); transform-origin: right; } }
      .effect-blinds-up { animation: blindsUp 1s linear; }
      @keyframes blindsUp { from { transform: scaleY(0); transform-origin: top; } to { transform: scaleY(1); transform-origin: top; } }
      .effect-blinds-down { animation: blindsDown 1s linear; }
      @keyframes blindsDown { from { transform: scaleY(0); transform-origin: bottom; } to { transform: scaleY(1); transform-origin: bottom; } }

      .effect-comb-horizontal { animation: combH 1s ease; -webkit-mask-image: repeating-linear-gradient(to right, black 0%, black 2%, transparent 2%, transparent 4%); -webkit-mask-size: 100% 100%; }
      @keyframes combH { from { -webkit-mask-size: 0% 100%; } to { -webkit-mask-size: 5000% 100%; } }
      .effect-comb-vertical { animation: combV 1s ease; -webkit-mask-image: repeating-linear-gradient(to bottom, black 0%, black 2%, transparent 2%, transparent 4%); }
      @keyframes combV { from { -webkit-mask-size: 100% 0%; } to { -webkit-mask-size: 100% 5000%; } }

      .effect-pan-up { animation: panUp 1s ease-out; }
      @keyframes panUp { from { transform: translateY(20%) scale(1.1); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
      .effect-pan-down { animation: panDown 1s ease-out; }
      @keyframes panDown { from { transform: translateY(-20%) scale(1.1); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
      .effect-pan-left { animation: panLeft 1s ease-out; }
      @keyframes panLeft { from { transform: translateX(20%) scale(1.1); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }
      .effect-pan-right { animation: panRight 1s ease-out; }
      @keyframes panRight { from { transform: translateX(-20%) scale(1.1); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }

      .effect-plus { animation: plus 1s ease-in; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
      @keyframes plus { from { clip-path: polygon(40% 40%, 60% 40%, 60% 60%, 40% 60%); opacity: 0; } to { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); opacity: 1; } }
      
      .effect-advance { animation: advance 1s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
      @keyframes advance { from { transform: scale(0.8) perspective(500px) rotateX(10deg); opacity: 0; } to { transform: scale(1) perspective(500px) rotateX(0); opacity: 1; } }

      .effect-shrink { animation: shrinkEnter 1s ease-out; }
      @keyframes shrinkEnter { from { transform: scale(1.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      .effect-expand { animation: expandEnter 1s ease-out; }
      @keyframes expandEnter { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      .effect-collapse { animation: collapse 1s ease-in; transform-origin: center; }
      @keyframes collapse { from { transform: scaleX(3) scaleY(3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      .effect-stretch { animation: stretch 1s ease-out; transform-origin: center; }
      @keyframes stretch { from { transform: scaleX(0.1); opacity: 0; } to { transform: scaleX(1); opacity: 1; } }
      .effect-squeeze { animation: squeeze 1s ease-out; transform-origin: center; }
      @keyframes squeeze { from { transform: scaleY(0.1); opacity: 0; } to { transform: scaleY(1); opacity: 1; } }

      .effect-whip { animation: whip 0.8s ease-in-out; transform-origin: bottom left; }
      @keyframes whip { from { transform: rotate(-30deg) translateX(-50%); opacity: 0; } to { transform: rotate(0) translateX(0); opacity: 1; } }

      .effect-ripple { animation: ripple 1.5s ease-out; }
